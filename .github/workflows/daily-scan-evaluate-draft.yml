name: Daily Scan + Evaluate + Draft

on:
  # Run twice daily: 5:30 AM PST and 5:30 PM PST
  schedule:
    - cron: '30 13 * * *'  # 5:30 AM PST (1:30 PM UTC)
    - cron: '30 01 * * *'  # 5:30 PM PST (1:30 AM UTC next day)

  # Also allow manual trigger
  workflow_dispatch:

jobs:
  scan-evaluate-draft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run daily scan + evaluate + draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node batch/daily-scan-evaluate-draft.mjs

      - name: Commit changes
        run: |
          git config user.name "career-ops-bot"
          git config user.email "navyny@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: daily scan + evaluate + draft [skip ci]"

      - name: Push changes
        run: |
          git push origin main || echo "No changes to push"

      - name: Log execution
        run: |
          echo "✅ Daily scan complete at $(date)"
          echo "📍 Check batch/application-drafts/ for new drafts"
          echo "📊 Check data/applications.md for tracker updates"
